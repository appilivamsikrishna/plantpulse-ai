<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 810" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="Plant Ops Assistant — suggested production request flow (on-prem)">
  <style>
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .hbox{fill:#ffffff;stroke:#d7ded8}
    .htitle{fill:#16201a;font-weight:600}
    .hsub{fill:#586259}
    .life{stroke:#dfe4e0;stroke-width:1.4;stroke-dasharray:3 6}
    .lbl{fill:#2c3730}
    .step{opacity:.32}
    .s1{animation:st1 14s infinite}.s2{animation:st2 14s infinite}.s3{animation:st3 14s infinite}
    .s4{animation:st4 14s infinite}.s5{animation:st5 14s infinite}.s6{animation:st6 14s infinite}
    .s7{animation:st7 14s infinite}.s8{animation:st8 14s infinite}.s9{animation:st9 14s infinite}
    .s10{animation:st10 14s infinite}.s11{animation:st11 14s infinite}.s12{animation:st12 14s infinite}
    @keyframes st1{0%{opacity:.32}2%,7%{opacity:1}9%,100%{opacity:.32}}
    @keyframes st2{0%,7%{opacity:.32}9%,14%{opacity:1}16%,100%{opacity:.32}}
    @keyframes st3{0%,15%{opacity:.32}17%,22%{opacity:1}24%,100%{opacity:.32}}
    @keyframes st4{0%,22%{opacity:.32}24%,29%{opacity:1}31%,100%{opacity:.32}}
    @keyframes st5{0%,30%{opacity:.32}32%,37%{opacity:1}39%,100%{opacity:.32}}
    @keyframes st6{0%,37%{opacity:.32}39%,44%{opacity:1}46%,100%{opacity:.32}}
    @keyframes st7{0%,45%{opacity:.32}47%,52%{opacity:1}54%,100%{opacity:.32}}
    @keyframes st8{0%,52%{opacity:.32}54%,59%{opacity:1}61%,100%{opacity:.32}}
    @keyframes st9{0%,60%{opacity:.32}62%,67%{opacity:1}69%,100%{opacity:.32}}
    @keyframes st10{0%,67%{opacity:.32}69%,74%{opacity:1}76%,100%{opacity:.32}}
    @keyframes st11{0%,75%{opacity:.32}77%,82%{opacity:1}84%,100%{opacity:.32}}
    @keyframes st12{0%,82%{opacity:.32}84%,89%{opacity:1}91%,100%{opacity:.32}}
  </style>
  <defs>
    <marker id="g" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#2f9e1e"/></marker>
    <marker id="b" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#0a86c0"/></marker>
    <marker id="m" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#8a948c"/></marker>
    <marker id="r" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#d23b34"/></marker>
    <marker id="v" markerWidth="10" markerHeight="10" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#6f57d6"/></marker>
  </defs>

  <rect x="0" y="0" width="1120" height="810" fill="#f4f6f4" rx="14"/>
  <text x="22" y="24" class="mono" font-size="11.5" letter-spacing="2" fill="#8a948c">SUGGESTED PRODUCTION · REQUEST FLOW</text>

  <!-- on-prem boundary -->
  <rect x="20" y="34" width="1080" height="760" rx="14" fill="none" stroke="#2f9e1e" stroke-opacity=".5" stroke-width="1.5" stroke-dasharray="7 6"/>
  <text x="34" y="52" class="mono" font-size="10.5" letter-spacing="1" fill="#2f9e1e">ON-PREMISE · PLANT NETWORK · data never leaves</text>

  <!-- lifelines -->
  <line class="life" x1="120" y1="116" x2="120" y2="740"/>
  <line class="life" x1="360" y1="116" x2="360" y2="740"/>
  <line class="life" x1="585" y1="116" x2="585" y2="740"/>
  <line class="life" x1="800" y1="116" x2="800" y2="740"/>
  <line class="life" x1="1015" y1="116" x2="1015" y2="740"/>

  <!-- headers -->
  <rect class="hbox" x="48" y="70" width="144" height="46" rx="10"/>
  <text x="120" y="89" text-anchor="middle" class="mono hsub" font-size="9.5" letter-spacing="1.5">OPERATOR</text>
  <text x="120" y="106" text-anchor="middle" class="htitle" font-size="13">Browser · UI (SSO)</text>

  <rect class="hbox" x="274" y="70" width="172" height="46" rx="10" stroke="#2f9e1e" stroke-opacity=".5"/>
  <text x="360" y="89" text-anchor="middle" class="mono" font-size="9.5" letter-spacing="1.5" fill="#2f9e1e">APP SERVER · pooled</text>
  <text x="360" y="106" text-anchor="middle" class="htitle" font-size="13">router · guardrails</text>

  <rect class="hbox" x="505" y="70" width="160" height="46" rx="10" stroke="#6f57d6" stroke-opacity=".55"/>
  <text x="585" y="89" text-anchor="middle" class="mono" font-size="9.5" letter-spacing="1.5" fill="#6f57d6">DATA STORE</text>
  <text x="585" y="106" text-anchor="middle" class="htitle" font-size="13">app DB · on-prem</text>

  <rect class="hbox" x="726" y="70" width="148" height="46" rx="10" stroke="#0a86c0" stroke-opacity=".5"/>
  <text x="800" y="89" text-anchor="middle" class="mono" font-size="9.5" letter-spacing="1.5" fill="#0a86c0">ON-PREM · GPU</text>
  <text x="800" y="106" text-anchor="middle" class="htitle" font-size="13">Local LLM (vLLM)</text>
  <text x="800" y="132" text-anchor="middle" class="mono" font-size="9" fill="#8a948c">multi-model: reason + narrate</text>

  <rect class="hbox" x="941" y="70" width="148" height="46" rx="10" stroke="#2f9e1e" stroke-opacity=".5"/>
  <text x="1015" y="89" text-anchor="middle" class="mono" font-size="9.5" letter-spacing="1.5" fill="#2f9e1e">EXASOL · VPC</text>
  <text x="1015" y="106" text-anchor="middle" class="htitle" font-size="13">SQL views</text>
  <text x="1015" y="132" text-anchor="middle" class="mono" font-size="9" fill="#8a948c">↑ fed by historian / CDC</text>

  <!-- STEP 1 -->
  <g class="step s1">
    <line x1="120" y1="158" x2="356" y2="158" stroke="#2f9e1e" stroke-width="2" marker-end="url(#g)"/>
    <text x="240" y="150" text-anchor="middle" class="lbl" font-size="11.5">ask a question (SSO authenticated)</text>
    <circle cx="120" cy="158" r="11" fill="#f4f6f4" stroke="#2f9e1e" stroke-width="2"/><text x="120" y="162" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#2f9e1e">1</text>
  </g>
  <!-- STEP 2 -->
  <g class="step s2">
    <line x1="360" y1="198" x2="581" y2="198" stroke="#6f57d6" stroke-width="2" marker-end="url(#v)"/>
    <text x="472" y="190" text-anchor="middle" class="lbl" font-size="11.5">load recent history</text>
    <circle cx="360" cy="198" r="11" fill="#f4f6f4" stroke="#6f57d6" stroke-width="2"/><text x="360" y="202" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#6f57d6">2</text>
  </g>
  <!-- STEP 3 -->
  <g class="step s3">
    <line x1="360" y1="238" x2="581" y2="238" stroke="#6f57d6" stroke-width="2" marker-end="url(#v)"/>
    <text x="472" y="230" text-anchor="middle" class="lbl" font-size="11.5">save user message</text>
    <circle cx="360" cy="238" r="11" fill="#f4f6f4" stroke="#6f57d6" stroke-width="2"/><text x="360" y="242" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#6f57d6">3</text>
  </g>
  <!-- STEP 4 -->
  <g class="step s4">
    <line x1="360" y1="282" x2="796" y2="282" stroke="#0a86c0" stroke-width="2" marker-end="url(#b)"/>
    <text x="580" y="274" text-anchor="middle" class="lbl" font-size="11.5">route: pick a view / write SQL</text>
    <text x="580" y="298" text-anchor="middle" class="hsub mono" font-size="9.5">+ history · prompt cache (prefix)</text>
    <circle cx="360" cy="282" r="11" fill="#f4f6f4" stroke="#0a86c0" stroke-width="2"/><text x="360" y="286" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#0a86c0">4</text>
  </g>
  <!-- STEP 5 -->
  <g class="step s5">
    <line x1="800" y1="330" x2="364" y2="330" stroke="#0a86c0" stroke-width="2" marker-end="url(#b)"/>
    <text x="580" y="322" text-anchor="middle" class="lbl" font-size="11.5">proposes tool + SQL</text>
    <circle cx="800" cy="330" r="11" fill="#f4f6f4" stroke="#0a86c0" stroke-width="2"/><text x="800" y="334" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#0a86c0">5</text>
  </g>
  <!-- guardrails (self) -->
  <g class="step s5">
    <rect x="322" y="348" width="76" height="34" rx="8" fill="#eef5ec" stroke="#2f9e1e"/>
    <circle cx="360" cy="365" r="11" fill="#f4f6f4" stroke="#2f9e1e" stroke-width="2"/><text x="360" y="369" text-anchor="middle" class="mono" font-size="10" font-weight="700" fill="#2f9e1e">✓</text>
    <text x="412" y="362" class="lbl" font-size="11.5"><tspan fill="#2f9e1e" font-weight="700">Guardrails (in OUR backend)</tspan></text>
    <text x="412" y="378" class="hsub mono" font-size="10">read-only? allowlisted? + role-based row scope</text>
  </g>
  <!-- error: blocked -->
  <line x1="356" y1="402" x2="124" y2="402" stroke="#d23b34" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#r)" opacity=".8"/>
  <text x="240" y="396" text-anchor="middle" class="mono" font-size="10" fill="#d23b34">✗ if unsafe / unauthorized → blocked</text>

  <!-- STEP 6 -->
  <g class="step s6">
    <line x1="360" y1="438" x2="1011" y2="438" stroke="#2f9e1e" stroke-width="2" marker-end="url(#g)"/>
    <text x="687" y="430" text-anchor="middle" class="lbl" font-size="11.5">run read-only SQL (pooled connection)</text>
    <circle cx="360" cy="438" r="11" fill="#f4f6f4" stroke="#2f9e1e" stroke-width="2"/><text x="360" y="442" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#2f9e1e">6</text>
  </g>
  <!-- error: db error -->
  <line x1="1011" y1="466" x2="364" y2="466" stroke="#d23b34" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#r)" opacity=".8"/>
  <text x="687" y="460" text-anchor="middle" class="mono" font-size="10" fill="#d23b34">✗ if DB error → retry / failover, then surface a clear message</text>

  <!-- STEP 7 -->
  <g class="step s7">
    <line x1="1015" y1="498" x2="364" y2="498" stroke="#8a948c" stroke-width="2" marker-end="url(#m)"/>
    <text x="687" y="490" text-anchor="middle" class="lbl" font-size="11.5">rows (the result set)</text>
    <circle cx="1015" cy="498" r="11" fill="#f4f6f4" stroke="#8a948c" stroke-width="2"/><text x="1015" y="502" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#2c3730">7</text>
  </g>
  <!-- STEP 8 -->
  <g class="step s8">
    <line x1="360" y1="538" x2="796" y2="538" stroke="#0a86c0" stroke-width="2" marker-end="url(#b)"/>
    <text x="580" y="530" text-anchor="middle" class="lbl" font-size="11.5">send the rows → narrate (stays on-prem)</text>
    <circle cx="360" cy="538" r="11" fill="#f4f6f4" stroke="#0a86c0" stroke-width="2"/><text x="360" y="542" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#0a86c0">8</text>
  </g>
  <!-- STEP 9 -->
  <g class="step s9">
    <line x1="800" y1="578" x2="364" y2="578" stroke="#0a86c0" stroke-width="2" marker-end="url(#b)"/>
    <text x="580" y="570" text-anchor="middle" class="lbl" font-size="11.5">stream answer (token by token)</text>
    <circle cx="800" cy="578" r="11" fill="#f4f6f4" stroke="#0a86c0" stroke-width="2"/><text x="800" y="582" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#0a86c0">9</text>
  </g>
  <!-- STEP 10 -->
  <g class="step s10">
    <line x1="360" y1="618" x2="581" y2="618" stroke="#6f57d6" stroke-width="2" marker-end="url(#v)"/>
    <text x="472" y="610" text-anchor="middle" class="lbl" font-size="11.5">save answer + tokens/cost</text>
    <circle cx="360" cy="618" r="11" fill="#f4f6f4" stroke="#6f57d6" stroke-width="2"/><text x="360" y="622" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#6f57d6">10</text>
  </g>
  <!-- STEP 11 -->
  <g class="step s11">
    <line x1="356" y1="658" x2="124" y2="658" stroke="#2f9e1e" stroke-width="2" marker-end="url(#g)"/>
    <text x="240" y="650" text-anchor="middle" class="lbl" font-size="11">stream answer + SQL + evidence + trace</text>
    <circle cx="360" cy="658" r="11" fill="#f4f6f4" stroke="#2f9e1e" stroke-width="2"/><text x="360" y="662" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#2f9e1e">11</text>
  </g>
  <!-- STEP 12 -->
  <g class="step s12">
    <rect x="60" y="686" width="120" height="34" rx="8" fill="#eef5ec" stroke="#2f9e1e"/>
    <circle cx="120" cy="703" r="11" fill="#f4f6f4" stroke="#2f9e1e" stroke-width="2"/><text x="120" y="707" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#2f9e1e">12</text>
    <text x="120" y="738" text-anchor="middle" class="lbl" font-size="11">render answer + glass-box</text>
  </g>

  <!-- legend -->
  <line x1="300" y1="700" x2="330" y2="700" stroke="#2f9e1e" stroke-width="2" marker-end="url(#g)"/>
  <text x="338" y="704" class="mono hsub" font-size="10">normal flow</text>
  <line x1="452" y1="700" x2="482" y2="700" stroke="#d23b34" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#r)"/>
  <text x="490" y="704" class="mono hsub" font-size="10">error / fallback</text>
  <line x1="600" y1="700" x2="630" y2="700" stroke="#6f57d6" stroke-width="2" marker-end="url(#v)"/>
  <text x="638" y="704" class="mono hsub" font-size="10">data store (on-prem)</text>
  <text x="300" y="724" class="mono hsub" font-size="10">SSO session · all data stays on-prem · local multi-model LLM · pooled Exasol · answer streams token-by-token</text>
</svg>
